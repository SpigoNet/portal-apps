name: Build and Deploy Spigo Portal

on:
  push:
    branches: [ main ] # Executa o pipeline ao dar push na branch main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gustavospigo/spigo-portal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permissão obrigatória para poder enviar a imagem para o GHCR do seu GitHub

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Configurar o Docker Buildx (necessário para compilações avançadas de cache)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 2. Fazer login no GitHub Container Registry (GHCR) usando credenciais nativas
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Token automático gerado pelo próprio GitHub

    # 3. Compilar a imagem Docker do Laravel e enviar para o GHCR
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha # Cache inteligente de camadas para acelerar deploys futuros
        cache-to: type=gha,mode=max

    # 4. Chamar o deploy-webhook no seu Mini PC do escritório para atualizar o container
    - name: Trigger Instant Deploy Webhook
      run: |
        curl "https://deploy.spigo.net/hooks/deploy-spigo-portal?token=353eb7c7f142b11b9436bdae96d6af95"